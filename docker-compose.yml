services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: unconference
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./drizzle:/drizzle:ro
      - ./docker/initdb/01-migrate.sh:/docker-entrypoint-initdb.d/01-migrate.sh:ro
      - ./docker/initdb/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  pgdata: